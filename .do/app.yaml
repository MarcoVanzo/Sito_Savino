name: sito-savino
services:
  - name: web
    github:
      repo: MarcoVanzo/sito_savino
      branch: main
      deploy_on_push: true
    build_command: composer install --optimize-autoloader --no-dev && npm install && npm run build
    run_command: echo "=== DEBUG APP_KEY ===" && echo "APP_KEY length:" $(echo -n "$APP_KEY" | wc -c) && php artisan migrate --force && php artisan storage:link; php artisan cache:clear; php artisan config:cache && php artisan tinker --execute="echo 'Cached key:' . (config('app.key') ? 'PRESENT' : 'MISSING');" && php artisan route:cache && php artisan view:cache && php artisan filament:optimize; heroku-php-apache2 public/
    envs:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: ${APP_DOMAIN}
      - key: APP_KEY
        type: SECRET
      - key: PREVIEW_AUTH_USER
        type: SECRET
      - key: PREVIEW_AUTH_PASS
        type: SECRET
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: ${sito-savino-db.HOSTNAME}
      - key: DB_PORT
        value: ${sito-savino-db.PORT}
      - key: DB_DATABASE
        value: ${sito-savino-db.DATABASE}
      - key: DB_USERNAME
        value: ${sito-savino-db.USERNAME}
      - key: DB_PASSWORD
        value: ${sito-savino-db.PASSWORD}

      - key: FILESYSTEM_DISK
        value: s3
      - key: MEDIA_DISK
        value: s3
      - key: AWS_ACCESS_KEY_ID
        type: SECRET
      - key: AWS_SECRET_ACCESS_KEY
        type: SECRET
      - key: AWS_DEFAULT_REGION
        value: fra1
      - key: AWS_BUCKET
        value: sito-savino-assets-2026
      - key: AWS_ENDPOINT
        value: https://fra1.digitaloceanspaces.com
      - key: AWS_URL
        value: https://sito-savino-assets-2026.fra1.digitaloceanspaces.com
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_ENCRYPT
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: APP_LOCALE
        value: it
      - key: INERTIA_SSR_ENABLED
        value: "false"
      - key: COMPREFACE_HOST
        value: http://157.230.98.6:8000
      - key: COMPREFACE_KEY
        type: SECRET
workers:
  - name: worker
    github:
      repo: MarcoVanzo/sito_savino
      branch: main
      deploy_on_push: true
    build_command: composer install --optimize-autoloader --no-dev
    run_command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        type: SECRET
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: ${sito-savino-db.HOSTNAME}
      - key: DB_PORT
        value: ${sito-savino-db.PORT}
      - key: DB_DATABASE
        value: ${sito-savino-db.DATABASE}
      - key: DB_USERNAME
        value: ${sito-savino-db.USERNAME}
      - key: DB_PASSWORD
        value: ${sito-savino-db.PASSWORD}
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: s3
      - key: MEDIA_DISK
        value: s3
      - key: AWS_ACCESS_KEY_ID
        type: SECRET
      - key: AWS_SECRET_ACCESS_KEY
        type: SECRET
      - key: AWS_DEFAULT_REGION
        value: fra1
      - key: AWS_BUCKET
        value: sito-savino-assets-2026
      - key: AWS_ENDPOINT
        value: https://fra1.digitaloceanspaces.com
      - key: COMPREFACE_HOST
        value: http://157.230.98.6:8000
      - key: COMPREFACE_KEY
        type: SECRET
databases:
  - name: sito-savino-db
    engine: MYSQL
    version: "8"
    production: true
    cluster_name: sito-savino-db
