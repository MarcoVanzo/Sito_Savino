# =============================================================================
# Backup Media — Sito Savino
# Sincronizza i file media da DO Spaces produzione a DO Spaces backup
# =============================================================================

name: Backup Media

on:
  schedule:
    # Ogni domenica alle 04:00 UTC (06:00 ora italiana)
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del backup manuale'
        required: false
        default: 'Backup media manuale'

permissions:
  issues: write

# Impedisce esecuzioni concorrenti (fix #10)
concurrency:
  group: backup-media
  cancel-in-progress: false

env:
  # Sorgente (produzione)
  PROD_BUCKET: sito-savino-assets-2026
  PROD_ENDPOINT: https://fra1.digitaloceanspaces.com

  # Destinazione (backup)
  BACKUP_BUCKET: sito-savino-backups
  BACKUP_REGION: fra1
  BACKUP_ENDPOINT: https://fra1.digitaloceanspaces.com

jobs:
  backup-media:
    name: Sync Media Files
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ---------------------------------------------------------------
      # 1. Installazione rclone
      # ---------------------------------------------------------------
      - name: Installa rclone
        run: |
          curl -sSfL https://rclone.org/install.sh | sudo bash
          rclone version

      # ---------------------------------------------------------------
      # 2. Configurazione rclone
      #    Fix #4: nessuna indentazione nel heredoc (rclone è sensibile)
      # ---------------------------------------------------------------
      - name: Configura rclone remotes
        env:
          DO_PROD_KEY: ${{ secrets.DO_PROD_SPACES_KEY }}
          DO_PROD_SECRET: ${{ secrets.DO_PROD_SPACES_SECRET }}
          DO_BK_KEY: ${{ secrets.DO_BACKUP_SPACES_KEY }}
          DO_BK_SECRET: ${{ secrets.DO_BACKUP_SPACES_SECRET }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [do-prod]
          type = s3
          provider = DigitalOcean
          access_key_id = ${DO_PROD_KEY}
          secret_access_key = ${DO_PROD_SECRET}
          endpoint = ${PROD_ENDPOINT}
          acl = private

          [do-backup]
          type = s3
          provider = DigitalOcean
          access_key_id = ${DO_BK_KEY}
          secret_access_key = ${DO_BK_SECRET}
          endpoint = ${BACKUP_ENDPOINT}
          acl = private
          EOF

          # Fix #4: rimuovi indentazione residua da YAML
          sed -i 's/^          //' ~/.config/rclone/rclone.conf

          # Verifica che i remote funzionino
          rclone lsd do-prod: > /dev/null 2>&1 && echo "✅ Remote do-prod OK" || { echo "❌ Remote do-prod fallito"; exit 1; }
          rclone lsd do-backup: > /dev/null 2>&1 && echo "✅ Remote do-backup OK" || { echo "❌ Remote do-backup fallito"; exit 1; }

      # ---------------------------------------------------------------
      # 3. Conta file sorgente (pre-sync)
      # ---------------------------------------------------------------
      - name: Conta file sorgente
        id: pre_sync
        run: |
          echo "📊 Conteggio file nel bucket di produzione..."
          PROD_COUNT=$(rclone lsf "do-prod:${PROD_BUCKET}" --recursive 2>/dev/null | wc -l)
          PROD_SIZE=$(rclone size "do-prod:${PROD_BUCKET}" --json 2>/dev/null | jq -r '.bytes // 0')
          echo "prod_count=${PROD_COUNT}" >> "$GITHUB_OUTPUT"
          echo "prod_size=${PROD_SIZE}" >> "$GITHUB_OUTPUT"
          echo "📁 File in produzione: ${PROD_COUNT} ($(numfmt --to=iec ${PROD_SIZE}))"

      # ---------------------------------------------------------------
      # 4. Sync con rclone copy
      #    Fix #7: aggiunto --checksum per verifica integrità
      # ---------------------------------------------------------------
      - name: Copia media su bucket di backup
        run: |
          echo "🔄 Avvio copia incrementale media..."

          rclone copy \
            "do-prod:${PROD_BUCKET}/" \
            "do-backup:${BACKUP_BUCKET}/media/" \
            --checksum \
            --transfers 8 \
            --checkers 16 \
            --s3-chunk-size 64M \
            --stats 30s \
            --stats-one-line \
            --log-level INFO \
            --log-file rclone-sync.log \
            -v

          echo "✅ Copia completata."

      # ---------------------------------------------------------------
      # 5. Genera manifest
      # ---------------------------------------------------------------
      - name: Genera manifest post-sync
        id: manifest
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H%M%SZ")
          MANIFEST_FILE="manifest-${TIMESTAMP}.txt"

          echo "📋 Generazione manifest..."
          {
            echo "# Media Backup Manifest"
            echo "# Generated: ${TIMESTAMP}"
            echo "# Source: do-prod:${PROD_BUCKET}"
            echo "# Destination: do-backup:${BACKUP_BUCKET}/media/"
            echo "---"
            rclone lsl "do-backup:${BACKUP_BUCKET}/media/" 2>/dev/null || true
          } > "$MANIFEST_FILE"

          BACKUP_COUNT=$(rclone lsf "do-backup:${BACKUP_BUCKET}/media/" --recursive 2>/dev/null | wc -l)
          echo "backup_count=${BACKUP_COUNT}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "manifest_file=${MANIFEST_FILE}" >> "$GITHUB_OUTPUT"

          echo "📁 File nel backup: ${BACKUP_COUNT}"

      # ---------------------------------------------------------------
      # 6. Upload manifest e log (fix #2: usa env vars)
      # ---------------------------------------------------------------
      - name: Upload manifest e log
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_BACKUP_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_BACKUP_SPACES_SECRET }}
          AWS_DEFAULT_REGION: ${{ env.BACKUP_REGION }}
        run: |
          YEAR=$(date -u +"%Y")
          MONTH=$(date -u +"%m")

          aws s3 cp \
            "${{ steps.manifest.outputs.manifest_file }}" \
            "s3://${BACKUP_BUCKET}/media/_manifests/${YEAR}/${MONTH}/${{ steps.manifest.outputs.manifest_file }}" \
            --endpoint-url "${BACKUP_ENDPOINT}"

          aws s3 cp \
            rclone-sync.log \
            "s3://${BACKUP_BUCKET}/media/_logs/${YEAR}/${MONTH}/sync-${{ steps.manifest.outputs.timestamp }}.log" \
            --endpoint-url "${BACKUP_ENDPOINT}"

          echo "✅ Manifest e log caricati."

      # ---------------------------------------------------------------
      # 7. Cleanup
      # ---------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          rm -f manifest-*.txt rclone-sync.log
          rm -f ~/.config/rclone/rclone.conf
          echo "🧹 Cleanup completato."

      # ---------------------------------------------------------------
      # 8. Riepilogo
      # ---------------------------------------------------------------
      - name: Riepilogo
        if: success()
        run: |
          echo "============================================="
          echo "  ✅ BACKUP MEDIA COMPLETATO"
          echo "============================================="
          echo "  Timestamp:       ${{ steps.manifest.outputs.timestamp }}"
          echo "  File produzione: ${{ steps.pre_sync.outputs.prod_count }}"
          echo "  File backup:     ${{ steps.manifest.outputs.backup_count }}"
          echo "  Modalità:        Copia incrementale con checksum (no delete)"
          echo "  Trigger:         ${{ github.event_name }}"
          echo "============================================="

  # -----------------------------------------------------------------
  # Notifica fallimento
  # -----------------------------------------------------------------
  notify-failure:
    name: Notifica fallimento
    runs-on: ubuntu-latest
    needs: backup-media
    if: failure()
    steps:
      - name: Crea issue di notifica
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ Backup Media fallito — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Backup Media Fallito',
              '',
              `**Data:** ${new Date().toISOString()}`,
              `**Workflow:** ${context.workflow}`,
              `**Run ID:** ${context.runId}`,
              '',
              `🔗 [Vedi logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '### Azione richiesta',
              'Verificare i logs e risolvere il problema.',
              'Eseguire un backup manuale dopo la correzione.'
            ].join('\n');

            for (const label of ['backup', 'urgente']) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: label === 'urgente' ? 'D93F0B' : '0E8A16'
                });
              }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['backup', 'urgente']
            });
