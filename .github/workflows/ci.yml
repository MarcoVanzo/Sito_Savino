# Pipeline CI per Sito Savino
# Esegue controlli di qualità su push a main e pull request

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    # MySQL 8.4 LTS — allineato a produzione DigitalOcean
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: sito_savino_test
          MYSQL_USER: sito_savino
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # Checkout del codice sorgente
      - name: Checkout codice
        uses: actions/checkout@v6

      # Configurazione PHP 8.4
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, curl, pdo, pdo_mysql
          coverage: none

      # Configurazione Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # Cache dipendenze Composer
      - name: Cache Composer
        uses: actions/cache@v6
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # Installazione dipendenze PHP
      - name: Composer install
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      # Installazione dipendenze Node.js
      - name: NPM install
        run: npm ci

      # Build degli asset frontend (Vite)
      - name: NPM build
        run: npm run build

      # Lint PHP — verifica errori di sintassi in app/
      - name: PHP Lint
        run: find app/ -name "*.php" -print0 | xargs -0 -n1 php -l

      # Preparazione ambiente per i test
      - name: Prepara .env per test
        run: |
          cp .env.example .env
          php artisan key:generate

      # Test PHPUnit con MySQL 8.4 (allineato a produzione)
      - name: Esegui test PHPUnit
        run: php artisan test
