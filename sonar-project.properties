# =============================================================================
# SonarCloud Configuration — Sito Savino
# =============================================================================

sonar.projectKey=MarcoVanzo_Sito_Savino
sonar.organization=marcovanzo

# Sorgenti da analizzare
sonar.sources=app,resources,routes,config,database,.github
sonar.tests=tests

# Esclusioni generali (vendor, build artifacts, storage)
sonar.exclusions=\
  vendor/**,\
  node_modules/**,\
  public/build/**,\
  storage/**,\
  bootstrap/cache/**,\
  *.lock

# ─── Esclusioni per falsi positivi ──────────────────────────────────────────

# Web:PageWithoutTitleCheck — Falso positivo per app Inertia.js/Vue
# Le pagine Vue usano <Head :title="..." /> di @inertiajs/vue3 per gestire
# il <title>. SonarCloud non comprende questo pattern SPA.
sonar.issue.ignore.multicriteria=e1,e2

# Ignora "Add a <title> tag" sui file Vue (Inertia gestisce i titoli)
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:PageWithoutTitleCheck
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.vue

# Ignora "weak hash algorithm" nei test (Laravel MustVerifyEmail richiede sha1)
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S4790
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/**/*.php
